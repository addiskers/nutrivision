upstream uat-backend {
    server uat-backend:8000;
}

upstream uat-frontend {
    server uat-frontend:80;
}

# HTTP: serve ACME challenge, redirect everything else to HTTPS www
server {
    listen 80;
    server_name skyquestinsights.com www.skyquestinsights.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.skyquestinsights.com$request_uri;
    }
}

# HTTPS non-www: redirect to www
server {
    listen 443 ssl;
    server_name skyquestinsights.com;

    ssl_certificate /etc/letsencrypt/live/skyquestinsights.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skyquestinsights.com/privkey.pem;

    return 301 https://www.skyquestinsights.com$request_uri;
}

# HTTPS www: main server
server {
    listen 443 ssl;
    server_name www.skyquestinsights.com;

    ssl_certificate /etc/letsencrypt/live/skyquestinsights.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skyquestinsights.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        proxy_pass http://uat-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location / {
        proxy_pass http://uat-frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
